# DPO 数据集生成配置 (M02 D-M02-09)
# 对应 M02 § 7.4 配置文件示例

project: insurance_dpo
seed: 42
version: dpo_v1.2

sources:
  policy:
    enabled: true
    type: policy
    path: data/insurance/raw/policies/
    parser: json
    limit: 0
  faq:
    enabled: true
    type: faq
    path: data/insurance/raw/faq/
    limit: 0
  ticket:
    enabled: true
    type: ticket
    path: data/insurance/raw/tickets/
    filter_category: compliance_qa
    limit: 0

strategies:
  rule_based:
    enabled: true
    # rules_file: configs/data/rules/hard_negatives.yaml
  llm_judge:
    enabled: false
    # ── LLM-as-Judge 配置 ──
    # 支持两种模式：
    #   1. 本地模型（api_key 留空）：直接连本地 vLLM / xinference
    #   2. 第三方 API（需填 api_key）：OpenAI / 通义千问 / DeepSeek 等
    #   例如 OpenAI:   base_url=https://api.openai.com/v1, api_key=sk-xxx
    #   例如通义千问:  base_url=https://dashscope.aliyuncs.com/compatible-mode/v1, api_key=sk-xxx
    judge_model: qwen2.5-7b-instruct
    judge_endpoint: http://127.0.0.1:8001/v1/chat/completions
    api_key: ""
    rag_endpoint: http://rag.internal/v1/rag/query
  retrieval_diff:
    enabled: false
    # 需要司内 RAG 端才可启用
    full_index: /shared/indexes/insurance_full/
    trunc_index: /shared/indexes/insurance_trunc/
    rag_endpoint: http://rag.internal/v1/rag/query

quality:
  min_prompt_len: 5
  max_prompt_len: 1024
  min_response_len: 10
  max_response_len: 2048
  max_chosen_rejected_similarity: 0.95

# ── Milvus 向量库配置（条款检索修复用）──
# 首次运行时会自动扫描 data_dir 下的 policy JSON 文件，
# 将 article_content 编码为向量存入本地 Milvus Lite 文件。
# 若依赖缺失 (pymilvus / sentence-transformers)，自动回退到模板兜底修复。
policy_store:
  enabled: true
  data_dir: data/insurance/raw/policies/
  embedding_model: BAAI/bge-small-zh-v1.5   # 中英文检索优化，dim=512
  embedding_dim: 512
  milvus_db_path: ./milvus_data/policy_store.db
  collection_name: policy_clauses
  top_k: 3

output:
  path: data/insurance/dpo_train_v1.2.jsonl
  shared_path: /shared/datasets/insurance_dpo/dpo_train_v1.2.jsonl
  sft_path: data/insurance/insurance_sft_v1.jsonl
  shared_sft_path: /shared/datasets/insurance_dpo/insurance_sft_v1.jsonl
