# LLaMA-Factory 单卡 SFT 烟雾测试 - M01 阶段交付物 D-M01-06
# configs/smoke_lora_qwen2_5_1_5b.yaml
# 极小虚构数据集 (≤ 50 条), 验证训练链路

model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct

stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

dataset_dir: data/smoke
dataset: smoke_sft
template: qwen
cutoff_len: 1024
overwrite_cache: false
preprocessing_num_workers: 2

output_dir: saves/smoke_lora
logging_steps: 1
save_steps: 100
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
tf32: true

flash_attn: fa2
report_to: none
seed: 42
max_steps: 5   # 烟雾测试仅跑 5 步, 验证链路
