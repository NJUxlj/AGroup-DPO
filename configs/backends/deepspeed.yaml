# DeepSpeed ZeRO3 后端配置模板 (M04)
# 使用方式：在训练配置中设置 trainer.distributed_backend: deepspeed

trainer:
  distributed_backend: deepspeed
  per_device_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  bf16: true

deepspeed:
  zero_optimization:
    stage: 3
    offload_optimizer:
      device: cpu
      pin_memory: true
    offload_param:
      device: cpu
      pin_memory: true
    overlap_comm: true
    contiguous_gradients: true
    stage3_gather_16bit_weights_on_model_save: true
  bf16:
    enabled: true
  gradient_accumulation_steps: 16
  train_micro_batch_size_per_gpu: 2
