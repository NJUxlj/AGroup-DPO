# M03 DPO 对齐训练配置 - 完整训练版（FR-02）
# configs/train_dpo_qwen2_5_1_5b_insurance.yaml
# 数据来源：M02 产出 dpo_train_v1.2.jsonl
# DPO 起点：SFT LoRA merge 后的 HF 模型（saves/.../insurance_sft_v1/lora_merged/）
# 启动命令：
#   FORCE_TORCHRUN=1 CUDA_VISIBLE_DEVICES=0,1 llamafactory-cli train configs/train_dpo_qwen2_5_1_5b_insurance.yaml

model_name_or_path: saves/qwen2_5_1_5b/insurance_sft_v1/lora_merged

stage: dpo
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

dataset_dir: data/insurance
dataset: insurance_dpo_v1.2
template: qwen
cutoff_len: 2048

output_dir: saves/qwen2_5_1_5b/insurance_dpo_v1.2/lora
logging_steps: 10
save_steps: 200
plot_loss: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 5.0e-6
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
tf32: true

# DPO 专属超参（LLaMA-Factory 0.9.1 兼容: pref_beta + pref_loss）
pref_beta: 0.1
pref_loss: sigmoid

flash_attn: fa2
report_to: tensorboard
seed: 42
