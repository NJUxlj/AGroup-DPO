# M03 LoRA SFT 微调配置 - 完整训练版（FR-01）
# configs/train_lora_qwen2_5_1_5b_insurance.yaml
# 数据来源：M02 产出 insurance_sft_v1.jsonl
# 启动命令：
#   FORCE_TORCHRUN=1 CUDA_VISIBLE_DEVICES=0,1 llamafactory-cli train configs/train_lora_qwen2_5_1_5b_insurance.yaml

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-1.5B-Instruct

stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

dataset_dir: data/insurance
dataset: insurance_sft_v1
template: qwen
cutoff_len: 2048
overwrite_cache: false
preprocessing_num_workers: 8

output_dir: saves/qwen2_5_1_5b/insurance_sft_v1/lora
logging_steps: 20
save_steps: 500
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
tf32: true

flash_attn: fa2
report_to: tensorboard
seed: 42
