# M03 SFT 烟雾测试配置 - 仅验证训练链路
# configs/smoke_sft_insurance.yaml
# 使用 M02 产出的 insurance_sft_v1.jsonl（48条），跑 10 步验证 loss 下降
# 启动命令：
#   FORCE_TORCHRUN=1 CUDA_VISIBLE_DEVICES=0,1 llamafactory-cli train configs/smoke_sft_insurance.yaml

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-1.5B-Instruct

stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

dataset_dir: data/insurance
dataset: insurance_sft_v1
template: qwen
cutoff_len: 2048
overwrite_cache: false
preprocessing_num_workers: 2

output_dir: saves/smoke/sft_insurance
logging_steps: 1
save_steps: 100
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
tf32: true

flash_attn: fa2
report_to: none
seed: 42
max_steps: 10
